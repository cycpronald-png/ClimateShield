name: Fetch Weather Data

on:
  schedule:
    - cron: '0 */8 * * *'  # Runs exactly 3 times a day (every 8 hours)
  workflow_dispatch:      # Allows manual trigger for testing

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install httpx

      - name: Generate static weather data
        run: |
          python scripts/generate_weather_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/*.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore(data): auto-update static weather data"
          
          # Pull latest changes from remote with conflict resolution
          if ! git pull --rebase origin main; then
            # If rebase fails due to conflicts, abort and use merge instead
            git rebase --abort
            git merge --strategy-option=theirs origin main
          fi
          
          # Push the changes
          git push origin main
